name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  actions: read
  attestations: write
  contents: write
  id-token: write

jobs:
  build:
    name: build ${{ matrix.goos }} ${{ matrix.goarch }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
          - goos: windows
            goarch: amd64
          - goos: windows
            goarch: arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.24.x"

      - name: Check whitespace
        run: git diff --check

      - name: Test
        run: go test ./...

      - name: Go vet
        run: go vet ./...

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          mkdir -p dist
          BIN="sshm"
          if [ "${GOOS}" = "windows" ]; then
            BIN="sshm.exe"
          fi
          go build -trimpath -ldflags="-s -w -X main.version=${GITHUB_REF_NAME}" -o "dist/${BIN}" ./cmd/sshm
          cd dist
          if [ "${GOOS}" = "windows" ]; then
            zip "sshm_${GITHUB_REF_NAME}_${GOOS}_${GOARCH}.zip" "${BIN}"
          else
            tar -czf "sshm_${GITHUB_REF_NAME}_${GOOS}_${GOARCH}.tar.gz" "${BIN}"
          fi

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: sshm-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/sshm_*

  release:
    name: publish release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Generate SBOM
        uses: anchore/sbom-action@v0
        with:
          path: .
          format: spdx-json
          output-file: dist/sbom.spdx.json
          upload-artifact: false
          upload-release-assets: false

      - name: Generate Checksums
        run: |
          cd dist
          shasum -a 256 sshm_* sbom.spdx.json > checksums.txt

      - name: Attest Release Assets
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: dist/*

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/sshm_*
            dist/sbom.spdx.json
            dist/checksums.txt
          generate_release_notes: true
