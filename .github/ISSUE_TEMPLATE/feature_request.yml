name: Feature request
description: Suggest an improvement for sshm.
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: markdown
    attributes:
      value: |
        Please describe the workflow and the practical problem. Avoid including private server details.
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What are you trying to do, and what is difficult today?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What should sshm do differently?
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - TUI
        - SSH login
        - Monitoring
        - Commands
        - File transfer
        - Configuration
        - Install or release
        - Documentation
        - Other
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Optional. Describe other approaches you considered.
  - type: checkboxes
    id: checks
    attributes:
      label: Checklist
      options:
        - label: This request fits sshm's local-first design.
          required: true
        - label: I searched existing issues before opening this one.
          required: true
