name: Feature request
description: Suggest a feature or workflow improvement for sshm.
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: markdown
    attributes:
      value: |
        Describe the workflow and the practical problem. Do not include private server information.
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What are you trying to do? What is inconvenient today?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: How should sshm improve this workflow?
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - TUI
        - SSH login
        - Monitoring
        - Commands
        - File transfer
        - Deployment
        - Configuration
        - Installation or release
        - Documentation
        - Other
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives
      description: Optional. Describe alternatives you considered.
  - type: checkboxes
    id: checks
    attributes:
      label: Checklist
      options:
        - label: This request fits sshm's local-first design.
          required: true
        - label: I have searched existing issues.
          required: true
