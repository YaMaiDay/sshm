name: Bug report
description: Report a reproducible issue in sshm.
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting an issue. Before submitting, remove passwords, private keys, private IPs, and production hostnames.
  - type: input
    id: version
    attributes:
      label: sshm version
      description: If available, run `sshm --version`.
      placeholder: v0.1.40
    validations:
      required: true
  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - macOS
        - Linux
        - Windows
        - Other
    validations:
      required: true
  - type: input
    id: arch
    attributes:
      label: CPU architecture
      placeholder: amd64, arm64
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Reproduction steps
      description: Explain how to reproduce the issue consistently.
      placeholder: |
        1. Run `sshm`
        2. Select ...
        3. Press ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs or screenshots
      description: Paste relevant output or screenshots after removing sensitive information.
      render: text
  - type: checkboxes
    id: checks
    attributes:
      label: Checklist
      options:
        - label: I have removed keys, passwords, private keys, and private server information.
          required: true
        - label: I have searched existing issues.
          required: true
