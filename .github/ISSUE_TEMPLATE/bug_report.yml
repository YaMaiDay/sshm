name: Bug report
description: Report a reproducible problem in sshm.
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a problem. Please remove passwords, private keys, private IPs, and production hostnames before submitting.
  - type: input
    id: version
    attributes:
      label: sshm version
      description: Run `sshm --version` if available.
      placeholder: v0.1.31
    validations:
      required: true
  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - macOS
        - Linux
        - Windows
        - Other
    validations:
      required: true
  - type: input
    id: arch
    attributes:
      label: CPU architecture
      placeholder: amd64, arm64
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Reproduction steps
      description: Tell us exactly how to reproduce the issue.
      placeholder: |
        1. Run `sshm`
        2. Select ...
        3. Press ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs or screenshots
      description: Paste relevant output or screenshots. Remove secrets first.
      render: text
  - type: checkboxes
    id: checks
    attributes:
      label: Checklist
      options:
        - label: I removed secrets, passwords, private keys, and private server details.
          required: true
        - label: I searched existing issues before opening this one.
          required: true
