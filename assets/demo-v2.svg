<svg width="1180" height="620" viewBox="0 0 1180 620" fill="none" xmlns="http://www.w3.org/2000/svg">
  <style>
    .mono { font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; }
    .title { fill: #7dd3fc; font-size: 24px; font-weight: 700; }
    .muted { fill: #8b95a7; }
    .text { fill: #e5e7eb; }
    .cyan { fill: #7dd3fc; }
    .green { fill: #4ade80; }
    .yellow { fill: #facc15; }
    .red { fill: #ef4444; }
    .frame { fill: #151923; stroke: #283241; }
    .card { fill: #111722; stroke: #283241; stroke-width: 2; }
    .selected { stroke: #38bdf8; }
    .bar-empty { fill: #334155; }
    .scene { fill: #0f172a; stroke: #334155; }
    .fade-a { animation: fadeA 6s infinite; }
    .fade-b { animation: fadeB 6s infinite; }
    @keyframes fadeA { 0%, 38%, 100% { opacity: 1; } 46%, 82% { opacity: 0; } }
    @keyframes fadeB { 0%, 38%, 100% { opacity: 0; } 46%, 82% { opacity: 1; } }
    .pulse { animation: pulse 1.4s infinite; }
    .pulse-fast { animation: pulse 0.85s infinite; }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.35; } }
  </style>

  <rect width="1180" height="620" rx="28" fill="#0f121a"/>
  <rect x="34" y="34" width="1112" height="552" rx="18" class="frame"/>
  <text x="58" y="76" class="mono title">sshm 服务器管理</text>
  <text x="280" y="76" class="mono muted" font-size="18">
    <tspan opacity="1">分类：全部  搜索：demo  最后刷新：05:10:26</tspan>
    <animate attributeName="opacity" values="1;0;0;1" keyTimes="0;0.32;0.76;1" dur="6s" repeatCount="indefinite"/>
  </text>
  <text x="280" y="76" class="mono muted" font-size="18" opacity="0">
    <tspan>传输任务  运行 1  未完成 3  已完成 12</tspan>
    <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.34;0.74;1" dur="6s" repeatCount="indefinite"/>
  </text>

  <g class="mono">
    <g>
